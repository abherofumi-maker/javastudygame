<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Quest</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(45deg,#ff5f6d,#ffc371);
text-align:center;
}

h1{
color:white;
text-shadow:2px 2px black;
}

#game{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

textarea{
width:100%;
height:150px;
background:#111;
color:#00ff9c;
border-radius:10px;
border:none;
padding:10px;
font-family:monospace;
font-size:16px;
}

button{
margin:5px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.run{background:#00e5ff}
.hint{background:#ffd54f}
.reset{background:#ef5350;color:white}

.stats{
margin-top:10px;
font-size:18px;
}

#result{
margin-top:10px;
font-size:20px;
}

.progress{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#4caf50;
width:0%;
}

</style>
</head>

<body>

<h1>🎮 JS QUEST</h1>

<div id="game">

<div class="card">

<div id="question"></div>

<br>

<textarea id="code"></textarea>

<br>

<button class="run" onclick="runCode()">▶ 実行</button>
<button class="hint" onclick="showHint()">🤖 ヒント</button>
<button class="reset" onclick="resetGame()">🔄 リセット</button>

<div id="result"></div>

<div class="stats">
レベル: <span id="level">1</span>  
XP: <span id="xp">0</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

</div>

<script>

let level = 0
let xp = 0

const problems = [

{
text:"Lv1: add(a,b) を作って足し算を返そう",
template:`function add(a,b){

}`,
hint:"return a + b",
tests:[
()=>add(2,3)===5,
()=>add(10,5)===15
]
},

{
text:"Lv2: multiply(a,b) 掛け算",
template:`function multiply(a,b){

}`,
hint:"a * b",
tests:[
()=>multiply(3,4)===12,
()=>multiply(5,5)===25
]
},

{
text:"Lv3: isEven(n) 偶数ならtrue",
template:`function isEven(n){

}`,
hint:"n % 2 === 0",
tests:[
()=>isEven(4)===true,
()=>isEven(5)===false
]
},

{
text:"Lv4: square(n) 二乗",
template:`function square(n){

}`,
hint:"n * n",
tests:[
()=>square(3)===9,
()=>square(10)===100
]
},

{
text:"Lv5: max(a,b) 大きい方",
template:`function max(a,b){

}`,
hint:"if または Math.max",
tests:[
()=>max(10,5)===10,
()=>max(2,8)===8
]
},

{
text:"Lv6: sumArray(arr) 配列合計",
template:`function sumArray(arr){

}`,
hint:"for または reduce",
tests:[
()=>sumArray([1,2,3])===6,
()=>sumArray([5,5,5])===15
]
}

]

function save(){

localStorage.setItem("jsquest_level",level)
localStorage.setItem("jsquest_xp",xp)

}

function load(){

level = parseInt(localStorage.getItem("jsquest_level")) || 0
xp = parseInt(localStorage.getItem("jsquest_xp")) || 0

}

function updateUI(){

document.getElementById("level").innerText = level+1
document.getElementById("xp").innerText = xp

let progress = ((level)/problems.length)*100
document.getElementById("bar").style.width = progress+"%"

}

function loadLevel(){

if(level>=problems.length){

document.getElementById("question").innerText="🏆 全クリア！"
document.getElementById("code").style.display="none"
return

}

document.getElementById("question").innerText = problems[level].text
document.getElementById("code").value = problems[level].template

updateUI()

}

function runCode(){

let code = document.getElementById("code").value

try{

eval(code)

let pass = true

for(let t of problems[level].tests){

if(!t()) pass=false

}

if(pass){

xp += 10
level++

document.getElementById("result").innerText="🎉 正解！ +10XP"

save()

setTimeout(loadLevel,800)

}else{

document.getElementById("result").innerText="❌ テスト失敗"

}

}catch(e){

document.getElementById("result").innerText="⚠ エラー: "+e.message

}

updateUI()

}

function showHint(){

document.getElementById("result").innerText="💡 "+problems[level].hint

}

function resetGame(){

localStorage.clear()
level=0
xp=0
loadLevel()

}

load()
loadLevel()

</script>

</body>
</html>
